services:

  chromadb:
    image: chromadb/chroma

    container_name: chromadb

    ports:
      - "8000:8000"

    volumes:
      - chroma_data:/data

  redis:
    image: redis:latest

    container_name: redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

volumes:
  chroma_data:

  redis_data: